version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: manasik360_db
    restart: always
    environment:
      POSTGRES_USER: manasik_user
      POSTGRES_PASSWORD: manasik_password
      POSTGRES_DB: manasik360_db
    ports:
      - "54360:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manasik_user -d manasik360_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manasik360_seeder
    environment:
      DATABASE_URL: postgres://manasik_user:manasik_password@db:5432/manasik360_db
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
        npx prisma db push &&
        node seed.js
      "

volumes:
  postgres_data:
