version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bahrain_db
    restart: always
    environment:
      POSTGRES_USER: bahrain_user
      POSTGRES_PASSWORD: bahrain_password
      POSTGRES_DB: bahrain_db
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bahrain_user -d bahrain_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bahrain_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: bahrain_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: bahrain_api
    restart: always
    environment:
      DATABASE_URL: postgresql://bahrain_user:bahrain_password@db:5432/bahrain_db?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 5001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: bahrain_web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      PORT: 3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
